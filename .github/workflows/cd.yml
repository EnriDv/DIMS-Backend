name: Backend Continuous Deployment

on:
  push:
    branches: ["master", "main"]

jobs:
  ci-and-security:
    name: Validate, Scan and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and Build Tests
        run: |
          dotnet restore DIMS-Backend.csproj
          dotnet build DIMS-Backend.csproj -c Release

      - name: Run Unit Tests
        run: dotnet test tests/DIMS-Backend.Tests.csproj

      - name: Build Production Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/dims-backend:latest -f dockerfile .

      - name: Trivy Container Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/dims-backend:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/dims-backend:latest

  deploy-to-ec2:
    name: Deploy Backend to EC2 via SSH
    needs: ci-and-security
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          context: .
          file: dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

  deploy-to-ec2:
    name: Deploy Backend to EC2 via SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/apps/
            # Autenticar Docker en GHCR desde la EC2 usando un Personal Access Token (PAT)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Descargar la nueva versión y reiniciar solo el backend de forma limpia
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d backend
            docker image prune -f
